{% extends "base.html" %}

{% block title %}Categories - StreamFlix{% endblock %}

{% block content %}
<!-- Page Header -->
<header class="page-header">
    <h1 class="page-title">Categories</h1>
    <p class="page-subtitle">Browse all content by genre</p>
</header>

<!-- Content Type Tabs -->
<div class="category-tabs">
    <button class="category-tab active" onclick="switchContentType('movies', this)">
        <i class="fas fa-film"></i> Movies
    </button>
    <button class="category-tab" onclick="switchContentType('tv', this)">
        <i class="fas fa-tv"></i> TV Shows
    </button>
    <button class="category-tab" onclick="switchContentType('anime', this)">
        <i class="fas fa-dragon"></i> Anime
    </button>
</div>

<!-- Genre Filter -->
<div class="genre-filter" id="genreFilterContainer">
    <label><i class="fas fa-filter"></i> Select Genre:</label>
    <select id="genreSelect" onchange="loadGenreContent()">
        <option value="">All Genres</option>
        <!-- Genres will be loaded dynamically -->
    </select>
    
    <div class="sort-filter">
        <label><i class="fas fa-sort"></i> Sort by:</label>
        <select id="sortBy" onchange="loadGenreContent()">
            <option value="popularity.desc">Popularity</option>
            <option value="vote_average.desc">Top Rated</option>
            <option value="release_date.desc">Release Date</option>
        </select>
    </div>
</div>

<!-- Loading State -->
<div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
</div>

<!-- Content Grid -->
<div class="category-grid" id="contentGrid" style="display: none;">
    <!-- Content will be loaded dynamically -->
</div>

<!-- Pagination -->
<div class="pagination" id="pagination">
    <button class="pagination-btn" id="prevPage" onclick="changePage(-1)" disabled>
        <i class="fas fa-chevron-left"></i> Previous
    </button>
    <span class="pagination-info" id="pageInfo">Page 1</span>
    <button class="pagination-btn" id="nextPage" onclick="changePage(1)">
        Next <i class="fas fa-chevron-right"></i>
    </button>
</div>

<!-- Empty State -->
<div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-state-icon">
        <i class="fas fa-film"></i>
    </div>
    <p class="empty-state-text">No content found for this genre.</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentContentType = 'movies';
    let currentGenre = '';
    let currentPage = 1;
    let totalPages = 1;

    // Movie genres
    const movieGenres = [
        { id: 28, name: 'Action' },
        { id: 12, name: 'Adventure' },
        { id: 16, name: 'Animation' },
        { id: 35, name: 'Comedy' },
        { id: 80, name: 'Crime' },
        { id: 99, name: 'Documentary' },
        { id: 18, name: 'Drama' },
        { id: 10751, name: 'Family' },
        { id: 14, name: 'Fantasy' },
        { id: 36, name: 'History' },
        { id: 27, name: 'Horror' },
        { id: 10402, name: 'Music' },
        { id: 9648, name: 'Mystery' },
        { id: 10749, name: 'Romance' },
        { id: 878, name: 'Science Fiction' },
        { id: 10770, name: 'TV Movie' },
        { id: 53, name: 'Thriller' },
        { id: 10752, name: 'War' },
        { id: 37, name: 'Western' }
    ];

    // TV genres
    const tvGenres = [
        { id: 10759, name: 'Action & Adventure' },
        { id: 16, name: 'Animation' },
        { id: 35, name: 'Comedy' },
        { id: 80, name: 'Crime' },
        { id: 99, name: 'Documentary' },
        { id: 18, name: 'Drama' },
        { id: 10751, name: 'Family' },
        { id: 10762, name: 'Kids' },
        { id: 9648, name: 'Mystery' },
        { id: 10763, name: 'News' },
        { id: 10764, name: 'Reality' },
        { id: 10765, name: 'Sci-Fi & Fantasy' },
        { id: 10766, name: 'Soap' },
        { id: 10767, name: 'Talk' },
        { id: 10768, name: 'War & Politics' },
        { id: 37, name: 'Western' }
    ];

    // Anime genre (using TV with specific parameters)
    const animeGenre = { id: 16, name: 'Anime' };

    document.addEventListener('DOMContentLoaded', () => {
        loadGenres('movies');
    });

    function switchContentType(type, tabElement) {
        // Update active tab
        document.querySelectorAll('.category-tabs .category-tab').forEach(tab => tab.classList.remove('active'));
        tabElement.classList.add('active');
        
        currentContentType = type;
        currentPage = 1;
        
        loadGenres(type);
    }

    function loadGenres(type) {
        const select = document.getElementById('genreSelect');
        select.innerHTML = '<option value="">All Genres</option>';
        
        let genres;
        if (type === 'movies') {
            genres = movieGenres;
        } else if (type === 'tv') {
            genres = tvGenres;
        } else if (type === 'anime') {
            genres = [{ id: 16, name: 'Anime' }];
        }
        
        genres.forEach(genre => {
            const option = document.createElement('option');
            option.value = genre.id;
            option.textContent = genre.name;
            select.appendChild(option);
        });
        
        // Load all content initially
        loadGenreContent();
    }

    async function loadGenreContent() {
        const genre = document.getElementById('genreSelect').value;
        const sortBy = document.getElementById('sortBy').value;
        currentGenre = genre;
        
        // Show loading, hide content and empty state
        document.getElementById('loadingState').style.display = 'flex';
        document.getElementById('contentGrid').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('pagination').style.display = 'none';
        
        try {
            let url;
            if (currentContentType === 'anime') {
                // For anime, use discover endpoint with Japanese language and animation genre
                if (genre) {
                    url = `/api/genre/tv/${genre}?page=${currentPage}`;
                } else {
                    url = `/api/discover/anime?page=${currentPage}`;
                }
            } else if (genre) {
                url = `/api/genre/${currentContentType}/${genre}?page=${currentPage}&sort_by=${sortBy}`;
            } else {
                // Load popular content for the type
                if (currentContentType === 'movies') {
                    url = `/api/movies/popular?page=${currentPage}`;
                } else {
                    url = `/api/tv/popular?page=${currentPage}`;
                }
            }
            
            const response = await fetch(url);
            const data = await response.json();
            
            // Filter for anime if needed
            let results = data.results;
            if (currentContentType === 'anime') {
                results = results.filter(item => 
                    item.original_language === 'ja' || 
                    (item.genre_ids && item.genre_ids.includes(16))
                );
            }
            
            totalPages = data.total_pages || 1;
            
            if (results.length === 0) {
                showEmptyState();
            } else {
                displayContent(results);
            }
        } catch (error) {
            console.error('Error loading genre content:', error);
            showEmptyState();
        }
    }

    function showEmptyState() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('contentGrid').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('pagination').style.display = 'none';
    }

    function displayContent(items) {
        const grid = document.getElementById('contentGrid');
        grid.innerHTML = '';
        
        items.forEach(item => {
            const type = currentContentType === 'anime' ? 'tv' : currentContentType;
            item.media_type = type;
            
            const card = document.createElement('div');
            card.className = 'category-card';
            
            card.innerHTML = `
                <img src="${item.poster_path ? IMG_URL + item.poster_path : ''}" alt="${item.title || item.name}">
                <h3 class="category-card-title">${item.title || item.name}</h3>
                <div class="card-meta" style="margin-top: 5px;">
                    <span class="card-rating">★ ${item.vote_average?.toFixed(1) || 'N/A'}</span>
                    <span>${item.release_date ? item.release_date.substring(0, 4) : item.first_air_date ? item.first_air_date.substring(0, 4) : ''}</span>
                </div>
            `;
            
            card.onclick = () => openVideoModal(item);
            grid.appendChild(card);
        });
        
        // Show content grid
        document.getElementById('loadingState').style.display = 'none';
        grid.style.display = 'grid';
        
        // Show pagination if there are more pages
        if (totalPages > 1) {
            document.getElementById('pagination').style.display = 'flex';
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }
    }

    function changePage(delta) {
        const newPage = currentPage + delta;
        if (newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            loadGenreContent();
        }
    }
</script>
{% endblock %}
