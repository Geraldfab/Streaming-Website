{% extends "base.html" %}

{% block title %}StreamFlix - Watch Movies & TV Shows Online{% endblock %}

{% block content %}
<!-- Hero Slider Section -->
<div class="hero-slider" id="heroSlider">
    <div class="hero-slides" id="heroSlides">
        <!-- Slides will be loaded dynamically -->
    </div>
    <button class="hero-arrow left" onclick="changeSlide(-1)">
        <i class="fas fa-chevron-left"></i>
    </button>
    <button class="hero-arrow right" onclick="changeSlide(1)">
        <i class="fas fa-chevron-right"></i>
    </button>
    <div class="hero-nav" id="heroNav">
        <!-- Dots will be generated dynamically -->
    </div>
</div>

<!-- Minimal Content Sections -->
<div class="content-section">
    <!-- Continue Watching - Shows recently watched/unfinished content -->
    <div class="row" id="continue-watching-row" style="display: none;">
        <div class="row-header">
            <h2 class="row-title">⏯️ Continue Watching</h2>
            <button class="clear-history-btn" onclick="clearWatchHistory()" title="Clear history">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'continue-watching-slider')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="continue-watching-slider"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'continue-watching-slider')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Trending Movies -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🔥 Trending Movies</h2>
            <a href="{{ url_for('movies') }}" class="row-view-all">View All <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'movies-slider')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="movies-slider"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'movies-slider')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Popular TV Shows -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">📺 Popular TV Shows</h2>
            <a href="{{ url_for('tvshows') }}" class="row-view-all">View All <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'tvshows-slider')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="tvshows-slider"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'tvshows-slider')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Popular Anime -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🎌 Popular Anime</h2>
            <a href="{{ url_for('anime') }}" class="row-view-all">View All <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'anime-slider')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="anime-slider"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'anime-slider')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentSlide = 0;
    let heroItems = [];
    let heroAutoSlideInterval;

    // Watch history management using localStorage
    const WATCH_HISTORY_KEY = 'streamflix_watch_history';
    const MAX_HISTORY_ITEMS = 10;

    // Get watch history from localStorage
    function getWatchHistory() {
        try {
            const history = localStorage.getItem(WATCH_HISTORY_KEY);
            return history ? JSON.parse(history) : [];
        } catch (e) {
            console.error('Error reading watch history:', e);
            return [];
        }
    }

    // Save item to watch history
    function saveToWatchHistory(item) {
        try {
            let history = getWatchHistory();
            
            // Remove existing entry if present
            history = history.filter(h => !(h.id === item.id && h.media_type === item.media_type));
            
            // Add to beginning with timestamp
            history.unshift({
                id: item.id,
                media_type: item.media_type,
                title: item.title || item.name,
                poster_path: item.poster_path,
                vote_average: item.vote_average,
                release_date: item.release_date || item.first_air_date,
                season: item.lastSeason || null,
                episode: item.lastEpisode || null,
                watchedAt: Date.now()
            });
            
            // Keep only last N items
            history = history.slice(0, MAX_HISTORY_ITEMS);
            
            localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(history));
            loadContinueWatching();
        } catch (e) {
            console.error('Error saving to watch history:', e);
        }
    }

    // Update watch progress for TV shows
    function updateWatchProgress(item, season, episode) {
        try {
            let history = getWatchHistory();
            const existingIndex = history.findIndex(h => h.id === item.id && h.media_type === 'tv');
            
            if (existingIndex !== -1) {
                history[existingIndex].season = season;
                history[existingIndex].episode = episode;
                history[existingIndex].watchedAt = Date.now();
                // Move to front
                const item = history.splice(existingIndex, 1)[0];
                history.unshift(item);
            } else {
                history.unshift({
                    id: item.id,
                    media_type: 'tv',
                    title: item.title || item.name,
                    poster_path: item.poster_path,
                    vote_average: item.vote_average,
                    release_date: item.release_date || item.first_air_date,
                    season: season,
                    episode: episode,
                    watchedAt: Date.now()
                });
            }
            
            history = history.slice(0, MAX_HISTORY_ITEMS);
            localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(history));
            loadContinueWatching();
        } catch (e) {
            console.error('Error updating watch progress:', e);
        }
    }

    // Remove item from watch history
    function removeFromWatchHistory(item) {
        try {
            let history = getWatchHistory();
            history = history.filter(h => !(h.id === item.id && h.media_type === item.media_type));
            localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(history));
            loadContinueWatching();
        } catch (e) {
            console.error('Error removing from watch history:', e);
        }
    }

    // Clear all watch history
    function clearWatchHistory() {
        if (confirm('Clear all watch history?')) {
            localStorage.removeItem(WATCH_HISTORY_KEY);
            loadContinueWatching();
        }
    }

    // Load continue watching content
    function loadContinueWatching() {
        const history = getWatchHistory();
        const row = document.getElementById('continue-watching-row');
        const container = document.getElementById('continue-watching-slider');
        
        if (!history || history.length === 0) {
            row.style.display = 'none';
            return;
        }
        
        row.style.display = 'block';
        container.innerHTML = '';
        
        history.forEach(item => {
            const type = item.media_type || 'movie';
            const card = document.createElement('div');
            card.className = 'card';
            
            // Calculate progress percentage (mock - would need actual duration)
            const progress = Math.floor(Math.random() * 70) + 10; // 10-80%
            
            card.innerHTML = `
                <div class="card-progress-container">
                    <img src="${IMG_URL}${item.poster_path}" alt="${item.title}" class="card-poster">
                    <div class="card-progress-bar">
                        <div class="card-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="card-overlay-buttons">
                        <button class="card-play-btn" onclick="event.stopPropagation(); playFromHistory(${item.id}, '${type}', ${item.season}, ${item.episode})">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="card-remove-btn" onclick="event.stopPropagation(); removeItemFromHistory(${item.id}, '${type}')">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="card-info">
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-meta">
                        <span class="card-rating">★ ${(item.vote_average || 0).toFixed(1)}</span>
                        <span>${item.season ? 'S' + item.season + 'E' + item.episode : (item.release_date ? item.release_date.substring(0, 4) : '')}</span>
                    </div>
                </div>
            `;
            
            card.onclick = () => {
                const fullItem = {...item};
                openVideoModal(fullItem);
            };
            
            container.appendChild(card);
        });
    }

    // Remove specific item from history
    function removeItemFromHistory(id, type) {
        removeFromWatchHistory({id: id, media_type: type});
    }

    // Play from history
    function playFromHistory(id, type, season, episode) {
        const server = document.getElementById('serverSelect').value;
        let embedURL = '';

        if (server === 'zxcstream') {
            if (type === 'movie') {
                embedURL = `https://zxcstream.xyz/embed/movie/${id}`;
            } else {
                embedURL = `https://zxcstream.xyz/embed/tv/${id}/${season || 1}/${episode || 1}`;
            }
        } else if (server === 'vidsrc.cc') {
            embedURL = `https://vidsrc.cc/v2/embed/${type}/${id}`;
        } else if (server === 'vidsrc.me') {
            embedURL = `https://vidsrc.net/embed/${type}/?tmdb=${id}`;
        } else if (server === 'player.videasy.net') {
            embedURL = `https://player.videasy.net/${type}/${id}`;
        }

        window.open(embedURL, '_blank');
    }

    // Override openVideoModal to save to watch history
    const originalOpenVideoModal = openVideoModal;
    openVideoModal = function(item) {
        // Save to watch history before opening modal
        if (item && item.id) {
            saveToWatchHistory(item);
        }
        originalOpenVideoModal(item);
    };

    // Load all content on page load
    document.addEventListener('DOMContentLoaded', async () => {
        // Load continue watching first
        loadContinueWatching();
        
        await loadHeroContent();
        await Promise.all([
            loadTrendingMovies(),
            loadPopularTVShows(),
            loadAnime()
        ]);
        // Start auto-slide after content loads
        startHeroAutoSlide();
    });

    // Fetch hero content (trending movies and TV shows)
    async function loadHeroContent() {
        try {
            const [moviesRes, tvRes] = await Promise.all([
                fetch('/api/trending/movie'),
                fetch('/api/trending/tv')
            ]);
            
            const moviesData = await moviesRes.json();
            const tvData = await tvRes.json();
            
            // Combine and shuffle for variety
            heroItems = [...moviesData.results, ...tvData.results]
                .filter(item => item.backdrop_path)
                .sort(() => Math.random() - 0.5)
                .slice(0, 5);
            
            displayHeroSlides();
        } catch (error) {
            console.error('Error loading hero content:', error);
        }
    }

    // Display hero slides
    function displayHeroSlides() {
        const slidesContainer = document.getElementById('heroSlides');
        const navContainer = document.getElementById('heroNav');
        
        slidesContainer.innerHTML = '';
        navContainer.innerHTML = '';
        
        heroItems.forEach((item, index) => {
            // Create slide
            const slide = document.createElement('div');
            slide.className = 'hero-slide';
            slide.style.backgroundImage = `url(${IMG_URL}${item.backdrop_path})`;
            slide.onclick = () => openVideoModal(item);
            
            const content = document.createElement('div');
            content.className = 'hero-content';
            content.innerHTML = `
                <h1 class="hero-title">${item.title || item.name}</h1>
                <div class="hero-meta">
                    <span class="hero-rating">★ ${item.vote_average?.toFixed(1) || 'N/A'}</span>
                    <span class="hero-year">${(item.release_date || item.first_air_date || '').substring(0, 4)}</span>
                    <span class="hero-quality">HD</span>
                </div>
                <p class="hero-description">${item.overview || ''}</p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" onclick="event.stopPropagation(); playHeroContent(${index})">
                        <i class="fas fa-play"></i> Play
                    </button>
                    <button class="btn btn-secondary" onclick="event.stopPropagation(); showHeroDetails(${index})">
                        <i class="fas fa-info-circle"></i> More Info
                    </button>
                </div>
            `;
            slide.appendChild(content);
            slidesContainer.appendChild(slide);
            
            // Create dot
            const dot = document.createElement('button');
            dot.className = `hero-dot ${index === 0 ? 'active' : ''}`;
            dot.onclick = (e) => { e.stopPropagation(); goToSlide(index); };
            navContainer.appendChild(dot);
        });
    }

    // Change slide
    function changeSlide(direction) {
        currentSlide = (currentSlide + direction + heroItems.length) % heroItems.length;
        updateHeroSlide();
    }

    // Go to specific slide
    function goToSlide(index) {
        currentSlide = index;
        updateHeroSlide();
    }

    // Update hero slide display
    function updateHeroSlide() {
        const slidesContainer = document.getElementById('heroSlides');
        slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        
        // Update dots
        document.querySelectorAll('.hero-dot').forEach((dot, index) => {
            dot.classList.toggle('active', index === currentSlide);
        });
    }

    // Start auto-slide
    function startHeroAutoSlide() {
        heroAutoSlideInterval = setInterval(() => {
            changeSlide(1);
        }, 5000);
    }

    // Stop auto-slide on user interaction
    document.getElementById('heroSlider').addEventListener('mouseenter', () => {
        clearInterval(heroAutoSlideInterval);
    });

    document.getElementById('heroSlider').addEventListener('mouseleave', () => {
        startHeroAutoSlide();
    });

    // Play hero content
    function playHeroContent(index) {
        const item = heroItems[index];
        if (item) {
            const type = item.media_type || 'movie';
            playContent(type, item.id);
        }
    }

    // Show hero details
    function showHeroDetails(index) {
        const item = heroItems[index];
        if (item) {
            openVideoModal(item);
        }
    }

    // Fetch and display trending movies
    async function loadTrendingMovies() {
        try {
            const response = await fetch('/api/trending/movie');
            const data = await response.json();
            displaySliderContent(data.results, 'movies-slider', 'movie');
        } catch (error) {
            console.error('Error loading trending movies:', error);
        }
    }

    // Fetch and display popular TV shows
    async function loadPopularTVShows() {
        try {
            const response = await fetch('/api/tv/popular');
            const data = await response.json();
            displaySliderContent(data.results, 'tvshows-slider', 'tv');
        } catch (error) {
            console.error('Error loading popular TV shows:', error);
        }
    }

    // Fetch and display anime
    async function loadAnime() {
        try {
            const response = await fetch('/api/discover/anime/popular');
            const data = await response.json();
            displaySliderContent(data.results, 'anime-slider', 'tv');
        } catch (error) {
            console.error('Error loading anime:', error);
        }
    }

    // Display content in slider with progress indicator
    function displaySliderContent(items, containerId, defaultType = 'movie') {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        container.innerHTML = '';
        
        items.slice(0, 20).forEach(item => {
            const type = item.media_type || defaultType;
            item.media_type = type;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${IMG_URL}${item.poster_path}" alt="${item.title || item.name}" class="card-poster">
                <div class="card-info">
                    <h3 class="card-title">${item.title || item.name}</h3>
                    <div class="card-meta">
                        <span class="card-rating">★ ${(item.vote_average || 0).toFixed(1)}</span>
                        <span>${item.release_date ? item.release_date.substring(0, 4) : item.first_air_date ? item.first_air_date.substring(0, 4) : ''}</span>
                    </div>
                </div>
            `;
            
            // Click to open modal
            card.onclick = () => {
                openVideoModal(item);
            };
            
            container.appendChild(card);
        });
    }

    // Play content directly
    function playContent(type, id) {
        const server = document.getElementById('serverSelect').value;
        let embedURL = '';

        if (server === 'zxcstream') {
            if (type === 'movie') {
                embedURL = `https://zxcstream.xyz/embed/movie/${id}`;
            } else {
                embedURL = `https://zxcstream.xyz/embed/tv/${id}/1/1`;
            }
        } else if (server === 'vidsrc.cc') {
            embedURL = `https://vidsrc.cc/v2/embed/${type}/${id}`;
        } else if (server === 'vidsrc.me') {
            embedURL = `https://vidsrc.net/embed/${type}/?tmdb=${id}`;
        } else if (server === 'player.videasy.net') {
            embedURL = `https://player.videasy.net/${type}/${id}`;
        }

        window.open(embedURL, '_blank');
    }

    // Hero play button
    function playHeroContent() {
        if (window.heroItem) {
            const type = window.heroItem.media_type || 'movie';
            playContent(type, window.heroItem.id);
        }
    }

    // Hero info button
    function showHeroDetails() {
        if (window.heroItem) {
            openVideoModal(window.heroItem);
        }
    }
</script>
{% endblock %}
