{% extends "base.html" %}

{% block title %}Movies - StreamFlix{% endblock %}

{% block content %}
<!-- Page Header -->
<header class="page-header">
    <h1 class="page-title">Movies</h1>
    <p class="page-subtitle">Discover the latest and greatest movies</p>
</header>

<!-- Genre Filter -->
<div class="genre-filter">
    <label><i class="fas fa-filter"></i> Filter:</label>
    <select id="genreFilter" onchange="filterByGenre()">
        <option value="">All Genres</option>
        <option value="28">Action</option>
        <option value="12">Adventure</option>
        <option value="16">Animation</option>
        <option value="35">Comedy</option>
        <option value="80">Crime</option>
        <option value="99">Documentary</option>
        <option value="18">Drama</option>
        <option value="10751">Family</option>
        <option value="14">Fantasy</option>
        <option value="36">History</option>
        <option value="27">Horror</option>
        <option value="10402">Music</option>
        <option value="9648">Mystery</option>
        <option value="10749">Romance</option>
        <option value="878">Science Fiction</option>
        <option value="10770">TV Movie</option>
        <option value="53">Thriller</option>
        <option value="10752">War</option>
        <option value="37">Western</option>
    </select>
    
    <div class="sort-filter">
        <label><i class="fas fa-sort"></i> Sort by:</label>
        <select id="sortFilter" onchange="sortContent()">
            <option value="popularity.desc">Popularity</option>
            <option value="vote_average.desc">Top Rated</option>
            <option value="release_date.desc">Release Date</option>
            <option value="revenue.desc">Revenue</option>
        </select>
    </div>
</div>

<!-- Content Sections -->
<div class="content-section">
    <!-- Trending Movies -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🔥 Trending This Week</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'trending-movies')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="trending-movies"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'trending-movies')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Popular Movies -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">⭐ Popular Movies</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'popular-movies')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="popular-movies"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'popular-movies')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Top Rated Movies -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🏆 Top Rated</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'toprated-movies')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="toprated-movies"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'toprated-movies')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Now Playing -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🎬 Now Playing in Theaters</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'nowplaying-movies')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="nowplaying-movies"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'nowplaying-movies')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Upcoming -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">📅 Upcoming Movies</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'upcoming-movies')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="upcoming-movies"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'upcoming-movies')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let allMovies = [];

    document.addEventListener('DOMContentLoaded', async () => {
        await Promise.all([
            loadTrendingMovies(),
            loadPopularMovies(),
            loadTopRatedMovies(),
            loadNowPlaying(),
            loadUpcomingMovies()
        ]);
    });

    async function loadTrendingMovies() {
        try {
            const response = await fetch('/api/trending/movie');
            const data = await response.json();
            displaySliderContent(data.results, 'trending-movies');
        } catch (error) {
            console.error('Error loading trending movies:', error);
        }
    }

    async function loadPopularMovies() {
        try {
            const response = await fetch('/api/movies/popular');
            const data = await response.json();
            displaySliderContent(data.results, 'popular-movies');
        } catch (error) {
            console.error('Error loading popular movies:', error);
        }
    }

    async function loadTopRatedMovies() {
        try {
            const response = await fetch('/api/movies/top_rated');
            const data = await response.json();
            displaySliderContent(data.results, 'toprated-movies');
        } catch (error) {
            console.error('Error loading top rated movies:', error);
        }
    }

    async function loadNowPlaying() {
        try {
            const response = await fetch('/api/movies/now_playing');
            const data = await response.json();
            displaySliderContent(data.results, 'nowplaying-movies');
        } catch (error) {
            console.error('Error loading now playing movies:', error);
        }
    }

    async function loadUpcomingMovies() {
        try {
            const response = await fetch('/api/movies/upcoming');
            const data = await response.json();
            displaySliderContent(data.results, 'upcoming-movies');
        } catch (error) {
            console.error('Error loading upcoming movies:', error);
        }
    }

    function displaySliderContent(items, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        container.innerHTML = '';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            item.media_type = 'movie';
            
            card.innerHTML = `
                <img src="${IMG_URL}${item.poster_path}" alt="${item.title}" class="card-poster">
                <div class="card-info">
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-meta">
                        <span class="card-rating">★ ${item.vote_average?.toFixed(1) || 'N/A'}</span>
                        <span>${item.release_date ? item.release_date.substring(0, 4) : ''}</span>
                    </div>
                </div>
                <div class="card-details">
                    <h4 class="card-details-title">${item.title}</h4>
                    <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">${item.overview?.substring(0, 100) || ''}...</p>
                    <div class="card-details-buttons">
                        <button class="card-details-btn play" onclick="event.stopPropagation(); playContent('movie', ${item.id})">
                            <i class="fas fa-play"></i> Play
                        </button>
                        <button class="card-details-btn info" onclick="event.stopPropagation(); openVideoModal(item)">
                            <i class="fas fa-info-circle"></i> Info
                        </button>
                    </div>
                </div>
            `;
            
            card.onclick = () => openVideoModal(item);
            container.appendChild(card);
        });
    }

    function playContent(type, id) {
        const server = document.getElementById('serverSelect').value;
        let embedURL = '';

        if (server === 'vidsrc.cc') {
            embedURL = `https://vidsrc.cc/v2/embed/${type}/${id}`;
        } else if (server === 'vidsrc.me') {
            embedURL = `https://vidsrc.net/embed/${type}/?tmdb=${id}`;
        } else if (server === 'player.videasy.net') {
            embedURL = `https://player.videasy.net/${type}/${id}`;
        }

        window.open(embedURL, '_blank');
    }

    function filterByGenre() {
        // Filter functionality can be expanded
        console.log('Filtering by genre...');
    }

    function sortContent() {
        // Sort functionality can be expanded
        console.log('Sorting content...');
    }
</script>
{% endblock %}
