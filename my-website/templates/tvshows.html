{% extends "base.html" %}

{% block title %}TV Shows - StreamFlix{% endblock %}

{% block content %}
<!-- Page Header -->
<header class="page-header">
    <h1 class="page-title">TV Shows</h1>
    <p class="page-subtitle">Binge-worthy series from around the world</p>
</header>

<!-- Genre Filter -->
<div class="genre-filter">
    <label><i class="fas fa-filter"></i> Filter:</label>
    <select id="genreFilter" onchange="filterByGenre()">
        <option value="">All Genres</option>
        <option value="10759">Action & Adventure</option>
        <option value="16">Animation</option>
        <option value="35">Comedy</option>
        <option value="80">Crime</option>
        <option value="99">Documentary</option>
        <option value="18">Drama</option>
        <option value="10751">Family</option>
        <option value="10762">Kids</option>
        <option value="9648">Mystery</option>
        <option value="10763">News</option>
        <option value="10764">Reality</option>
        <option value="10765">Sci-Fi & Fantasy</option>
        <option value="10766">Soap</option>
        <option value="10767">Talk</option>
        <option value="10768">War & Politics</option>
        <option value="37">Western</option>
    </select>
    
    <div class="sort-filter">
        <label><i class="fas fa-sort"></i> Sort by:</label>
        <select id="sortFilter" onchange="sortContent()">
            <option value="popularity.desc">Popularity</option>
            <option value="vote_average.desc">Top Rated</option>
            <option value="first_air_date.desc">Release Date</option>
        </select>
    </div>
</div>

<!-- Content Sections -->
<div class="content-section">
    <!-- Trending TV Shows -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🔥 Trending This Week</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'trending-tv')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="trending-tv"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'trending-tv')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Popular TV Shows -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">⭐ Popular TV Shows</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'popular-tv')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="popular-tv"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'popular-tv')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Top Rated TV Shows -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">🏆 Top Rated Series</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'toprated-tv')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="toprated-tv"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'toprated-tv')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- On The Air -->
    <div class="row">
        <div class="row-header">
            <h2 class="row-title">📺 Currently Airing</h2>
        </div>
        <div class="row-slider">
            <button class="slider-btn left" onclick="scrollSlider('left', 'ontheair-tv')">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="slider-container" id="ontheair-tv"></div>
            <button class="slider-btn right" onclick="scrollSlider('right', 'ontheair-tv')">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await Promise.all([
            loadTrendingTVShows(),
            loadPopularTVShows(),
            loadTopRatedTVShows(),
            loadOnTheAir()
        ]);
    });

    async function loadTrendingTVShows() {
        try {
            const response = await fetch('/api/trending/tv');
            const data = await response.json();
            displaySliderContent(data.results, 'trending-tv');
        } catch (error) {
            console.error('Error loading trending TV shows:', error);
        }
    }

    async function loadPopularTVShows() {
        try {
            const response = await fetch('/api/tv/popular');
            const data = await response.json();
            displaySliderContent(data.results, 'popular-tv');
        } catch (error) {
            console.error('Error loading popular TV shows:', error);
        }
    }

    async function loadTopRatedTVShows() {
        try {
            const response = await fetch('/api/tv/top_rated');
            const data = await response.json();
            displaySliderContent(data.results, 'toprated-tv');
        } catch (error) {
            console.error('Error loading top rated TV shows:', error);
        }
    }

    async function loadOnTheAir() {
        try {
            const response = await fetch('/api/tv/on_the_air');
            const data = await response.json();
            displaySliderContent(data.results, 'ontheair-tv');
        } catch (error) {
            console.error('Error loading on the air TV shows:', error);
        }
    }

    function displaySliderContent(items, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        container.innerHTML = '';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            item.media_type = 'tv';
            
            card.innerHTML = `
                <img src="${IMG_URL}${item.poster_path}" alt="${item.name}" class="card-poster">
                <div class="card-info">
                    <h3 class="card-title">${item.name}</h3>
                    <div class="card-meta">
                        <span class="card-rating">★ ${item.vote_average?.toFixed(1) || 'N/A'}</span>
                        <span>${item.first_air_date ? item.first_air_date.substring(0, 4) : ''}</span>
                    </div>
                </div>
                </div>
            `;
            
            card.onclick = () => openVideoModal(item);
            container.appendChild(card);
        });
    }

    function playContent(type, id) {
        const server = document.getElementById('serverSelect').value;
        let embedURL = '';

        if (server === 'vidsrc.cc') {
            embedURL = `https://vidsrc.cc/v2/embed/${type}/${id}`;
        } else if (server === 'vidsrc.me') {
            embedURL = `https://vidsrc.net/embed/${type}/?tmdb=${id}`;
        } else if (server === 'player.videasy.net') {
            embedURL = `https://player.videasy.net/${type}/${id}`;
        }

        window.open(embedURL, '_blank');
    }

    function filterByGenre() {
        console.log('Filtering by genre...');
    }

    function sortContent() {
        console.log('Sorting content...');
    }
</script>
{% endblock %}
